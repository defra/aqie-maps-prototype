<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    {% include "govuk-prototype-kit/includes/homepage-top.njk" %}

    <h1 class="govuk-heading-xl">
      {{ serviceName }}
    </h1>

    <details class="govuk-details" id="stations-details">
      <summary class="govuk-details__summary">
        <span class="govuk-details__summary-text" id="stations-summary">Monitoring stations <span
            id="stations-count"></span></span>
      </summary>
      <div class="govuk-details__text" id="stations-content">
        <p class="govuk-body" id="stations-loading">Loading&hellip;</p>
      </div>
    </details>
  </div>
</div>
